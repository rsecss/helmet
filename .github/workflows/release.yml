name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: cppcheck 静态分析
        run: |
          sudo apt-get update && sudo apt-get install -y cppcheck
          cppcheck \
            --enable=warning,performance,portability \
            --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --suppress=preprocessorErrorDirective \
            -DUSE_HAL_DRIVER -DSTM32F103xB \
            -I Core/Inc \
            -I Drivers/STM32F1xx_HAL_Driver/Inc \
            -I Drivers/CMSIS/Include \
            -I Drivers/CMSIS/Device/ST/STM32F1xx/Include \
            APP/

      - name: 头文件守卫检查
        run: |
          fail=0
          for f in APP/*.h; do
            name=$(basename "$f" .h | tr '[:lower:]' '[:upper:]')_H
            if ! grep -q "#ifndef $name" "$f"; then
              echo "::error file=$f::缺少 #ifndef $name 头文件守卫"
              fail=1
            fi
          done
          exit $fail

      - name: 编码规范检查
        run: |
          fail=0
          for f in $(find APP/ -name '*.c' -o -name '*.h'); do
            if head -c 3 "$f" | grep -qP '\xef\xbb\xbf'; then
              echo "::error file=$f::检测到 UTF-8 BOM"
              fail=1
            fi
            if grep -qP '\r\n' "$f"; then
              echo "::error file=$f::检测到 CRLF 行尾"
              fail=1
            fi
          done
          exit $fail

  release:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 生成 cliff.toml
        run: |
          cat > cliff.toml << 'TOML'
          [changelog]
          header = ""
          body = """
          {% for group, commits in commits | group_by(attribute="group") %}\
          ### {{ group | upper_first }}
          {% for commit in commits %}\
          - {{ commit.message | split(pat="\n") | first | trim }} \
            ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/rsecss/helmet/commit/{{ commit.id }}))\
          {% endfor %}
          {% endfor %}
          """
          trim = true

          [git]
          conventional_commits = true
          filter_unconventional = true
          commit_parsers = [
            { message = "^feat", group = "🚀 Features" },
            { message = "^fix", group = "🐛 Bug Fixes" },
            { message = "^docs", group = "📄 Documentation" },
            { message = "^refactor", group = "🏗️ Refactors" },
            { message = "^perf", group = "⚡ Performance" },
            { message = "^test", group = "✅ Tests" },
            { message = "^(chore|ci)", group = "🔧 Chores" },
          ]
          TOML

      - name: 生成 Changelog
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          GITHUB_REPO: ${{ github.repository }}

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.content }}

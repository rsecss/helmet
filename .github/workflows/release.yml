name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  validate:
    name: 校验 tag 与 CHANGELOG
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
      previous: ${{ steps.parse.outputs.previous }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 解析版本号
        id: parse
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          PREV=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")
          echo "previous=$PREV" >> "$GITHUB_OUTPUT"
          echo "解析 tag=$TAG version=$VERSION previous=$PREV"

      - name: 校验 tag 已合入 main
        run: |
          TAG="${GITHUB_REF_NAME}"
          if ! git branch -r --contains "$TAG" | grep -qE "origin/main$"; then
            echo "::error::tag $TAG 不在 main 分支上。发版必须先把 release PR 合到 main，再从 main HEAD 打 tag。"
            exit 1
          fi
          echo "✓ tag $TAG 已合入 main"

      - name: 校验 CHANGELOG.md 含该版本段落
        run: |
          VERSION="${{ steps.parse.outputs.version }}"
          HEADER="## [${VERSION}]"
          if ! grep -qF "$HEADER" CHANGELOG.md; then
            echo "::error file=CHANGELOG.md::未找到 '${HEADER} - YYYY-MM-DD' 段落，请按 Keep a Changelog 格式补全后再发版"
            exit 1
          fi
          echo "✓ CHANGELOG.md 含 ${HEADER} 段落"

  quality:
    name: 质量门禁
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: cppcheck 静态分析
        run: |
          sudo apt-get update && sudo apt-get install -y cppcheck
          cppcheck \
            --enable=warning,performance,portability \
            --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --suppress=preprocessorErrorDirective \
            -DUSE_HAL_DRIVER -DSTM32F103xB \
            -I Core/Inc \
            -I Drivers/STM32F1xx_HAL_Driver/Inc \
            -I Drivers/CMSIS/Include \
            -I Drivers/CMSIS/Device/ST/STM32F1xx/Include \
            APP/

      - name: 头文件守卫检查
        run: |
          fail=0
          for f in APP/*.h; do
            name=$(basename "$f" .h | tr '[:lower:]' '[:upper:]')_H
            if ! grep -q "#ifndef $name" "$f"; then
              echo "::error file=$f::缺少 #ifndef $name 头文件守卫"
              fail=1
            fi
          done
          exit $fail

      - name: 编码规范检查
        run: |
          fail=0
          for f in $(find APP/ -name '*.c' -o -name '*.h'); do
            if head -c 3 "$f" | grep -qP '\xef\xbb\xbf'; then
              echo "::error file=$f::检测到 UTF-8 BOM"
              fail=1
            fi
            if grep -qP '\r\n' "$f"; then
              echo "::error file=$f::检测到 CRLF 行尾"
              fail=1
            fi
          done
          exit $fail

  release:
    name: 发布 GitHub Release
    needs: [validate, quality]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 抽取 CHANGELOG 主体
        id: extract
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          HEADER="## [${VERSION}]"
          awk -v hdr="$HEADER" '
            index($0, hdr) == 1                    { in_section=1; next }
            in_section && index($0, "## [") == 1   { exit }
            in_section && /^\[[^]]*\]: /           { exit }
            in_section                             { print }
          ' CHANGELOG.md | awk 'NF { p=1 } p' > /tmp/changelog_body.md

          if [ ! -s /tmp/changelog_body.md ]; then
            echo "::error::CHANGELOG.md 中 ${HEADER} 段落抽取为空"
            exit 1
          fi
          echo "抽取主体行数: $(wc -l < /tmp/changelog_body.md)"

      - name: 生成 commit 附录
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header

      - name: 拼接 Release Note
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          PREV: ${{ needs.validate.outputs.previous }}
          REPO: ${{ github.repository }}
          CLIFF_BODY: ${{ steps.cliff.outputs.content }}
        run: |
          {
            cat /tmp/changelog_body.md
            echo ""
            echo "<details>"
            echo "<summary>📝 完整提交记录（自动生成）</summary>"
            echo ""
            printf '%s\n' "$CLIFF_BODY"
            echo ""
            echo "</details>"
            echo ""
            if [ -n "$PREV" ]; then
              echo "**完整对比**: https://github.com/${REPO}/compare/${PREV}...v${VERSION}"
            fi
          } > /tmp/release_note.md
          echo "===== Release Note 预览 ====="
          cat /tmp/release_note.md
          echo "============================="

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release_note.md
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
